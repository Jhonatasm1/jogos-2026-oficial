<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Game of Us - Ranking Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260330-12">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <header>
        <h1>The Game of Us</h1>
        <div class="status-info">
            <p id="status-atualizacao">Carregando...</p>
            <p id="ultima-atualizacao"></p>
            <button id="refresh-button">Atualizar Agora</button>
        </div>
    </header>

    <main>
        <nav class="tabs-nav">
            <button class="tab-btn active" data-tab="visao-geral">Visão Geral</button>
            <button class="tab-btn" data-tab="tempo-jogo">Tempo de Jogo</button>
            <button class="tab-btn" data-tab="dificuldade">Dificuldade</button>
            <button class="tab-btn" data-tab="plataforma">Plataforma</button>
            <button class="tab-btn" data-tab="avaliacao">Avaliação Pessoal</button>
            <button class="tab-btn" data-tab="tabela">Tabela Completa</button>
        </nav>

        <div class="filters-container" id="filters-top">
            <label>Plataforma:<select id="filter-plataforma"></select></label>
            <label>Multiplayer:<select id="filter-multiplayer"></select></label>
            <label>Ano de Conclusão:<select id="filter-ano-conclusao"></select></label>
        </div>

        <div class="tabs-container">
            <!-- Visão Geral -->
            <section class="tab-content active" id="visao-geral">
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">Total de Jogos</span>
                        <span class="stat-value" id="total-jogos">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Concluídos</span>
                        <span class="stat-value" id="total-concluidos">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Jogando</span>
                        <span class="stat-value" id="total-jogando">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Pendentes</span>
                        <span class="stat-value" id="total-pendentes">-</span>
                    </div>
                </div>
                <div class="charts-grid">
                    <div class="chart-container">
                        <canvas id="chart-status-setores"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="chart-status"></canvas>
                    </div>
                </div>
            </section>

            <!-- Tempo de Jogo -->
            <section class="tab-content" id="tempo-jogo">
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">Total de Horas Jogadas</span>
                        <span class="stat-value" id="total-horas-jogadas">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Total de Horas Pendentes</span>
                        <span class="stat-value" id="total-horas-pendentes">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Média de Tempo de Gameplay</span>
                        <span class="stat-value" id="media-gameplay">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Média dos Jogos Zerados</span>
                        <span class="stat-value" id="media-zerados">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Jogo Solo Mais Jogado</span>
                        <span class="stat-value" id="solo-mais-jogado" style="font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; display: block;">-</span>
                    </div>
                </div>
                <div class="charts-grid">
                    <div class="chart-container">
                        <canvas id="chart-top-tempo"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="chart-curtos-zerados"></canvas>
                    </div>
                </div>
                <h3 style="margin-top: 1.5rem; text-align: center; color: var(--text-light);">Top 30 Jogos Mais Jogados</h3>
                <div class="list-container" id="lista-tempo" style="margin-top: 1rem;"></div>
            </section>

            <!-- Dificuldade -->
            <section class="tab-content" id="dificuldade">
                <div class="grid-container" id="grid-dificuldade"></div>
            </section>

            <!-- Plataforma -->
            <section class="tab-content" id="plataforma">
                <div class="grid-container" id="grid-plataforma"></div>
            </section>

            <!-- Avaliação Pessoal -->
            <section class="tab-content" id="avaliacao">
                <div class="list-container" id="lista-avaliacao"></div>
            </section>

            <!-- Tabela Completa -->
            <section class="tab-content" id="tabela">
                <div class="table-container">
                    <table>
                        <thead id="cabecalho-tabela"></thead>
                        <tbody id="corpo-tabela"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js?v=20260330-12"></script>
</body>
</html>
