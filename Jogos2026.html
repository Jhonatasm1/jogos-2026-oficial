<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos 2026 - Ranking Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <header>
        <h1>Jogos 2026</h1>
        <div class="status-info">
            <p id="status-atualizacao">Carregando...</p>
            <p id="ultima-atualizacao"></p>
            <button id="refresh-button">Atualizar Agora</button>
        </div>
    </header>

    <main>
        <nav class="tabs-nav">
            <button class="tab-btn active" data-tab="visao-geral">Visão Geral</button>
            <button class="tab-btn" data-tab="tempo-jogo">Tempo de Jogo</button>
            <button class="tab-btn" data-tab="dificuldade">Dificuldade</button>
            <button class="tab-btn" data-tab="plataforma">Plataforma</button>
            <button class="tab-btn" data-tab="avaliacao">Avaliação Pessoal</button>
            <button class="tab-btn" data-tab="tabela">Tabela Completa</button>
        </nav>

        <div class="tabs-container">
            <!-- Visão Geral -->
            <section class="tab-content active" id="visao-geral">
                <div class="filters-container" id="filters-visao-geral">
                    <label>Plataforma:<select id="filter-vg-plataforma"></select></label>
                    <label>Multiplayer:<select id="filter-vg-multiplayer"></select></label>
                    <label>Ano de Conclusão:<select id="filter-vg-ano-conclusao"></select></label>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">Total de Jogos</span>
                        <span class="stat-value" id="total-jogos">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Concluídos</span>
                        <span class="stat-value" id="total-concluidos">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Jogando</span>
                        <span class="stat-value" id="total-jogando">-</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Pendentes</span>
                        <span class="stat-value" id="total-pendentes">-</span>
                    </div>
                </div>
                <div class="charts-grid">
                    <div class="chart-container">
                        <canvas id="chart-plataformas"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="chart-status"></canvas>
                    </div>
                </div>
            </section>

            <!-- Tempo de Jogo -->
            <section class="tab-content" id="tempo-jogo">
                <div class="list-container" id="lista-tempo"></div>
            </section>

            <!-- Dificuldade -->
            <section class="tab-content" id="dificuldade">
                <div class="grid-container" id="grid-dificuldade"></div>
            </section>

            <!-- Plataforma -->
            <section class="tab-content" id="plataforma">
                <div class="grid-container" id="grid-plataforma"></div>
            </section>

            <!-- Avaliação Pessoal -->
            <section class="tab-content" id="avaliacao">
                <div class="list-container" id="lista-avaliacao"></div>
            </section>

            <!-- Tabela Completa -->
            <section class="tab-content" id="tabela">
                <div class="filters-container" id="filters-tabela">
                    <label>Ordenar por:
                        <select id="sort-mode">
                            <option value="none">Sem ordenação</option>
                            <option value="personal-desc">Avaliação Pessoal (Maior)</option>
                            <option value="tempo-desc">Tempo de Jogo (Maior)</option>
                            <option value="tempo-asc">Tempo de Jogo (Menor)</option>
                            <option value="ano-desc">Ano de Lançamento (Mais Novo)</option>
                            <option value="ano-asc">Ano de Lançamento (Mais Velho)</option>
                            <option value="alfabetica-asc">Alfabética (A→Z)</option>
                            <option value="alfabetica-desc">Alfabética (Z→A)</option>
                            <option value="custom">Personalizado</option>
                        </select>
                    </label>
                    <div id="custom-sort" hidden>
                        <label>Coluna:<select id="sort-column"></select></label>
                        <div id="custom-direction-wrap" hidden>
                            <label>Ordem:<select id="sort-direction">
                                <option value="asc">Crescente</option>
                                <option value="desc">Decrescente</option>
                            </select></label>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead id="cabecalho-tabela"></thead>
                        <tbody id="corpo-tabela"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
